name: Generate RSS Feed

on:
  # Exécution automatique toutes les 6 heures
  schedule:
    - cron: '0 */6 * * *'  # À 00:00, 06:00, 12:00, 18:00 UTC

  # Permet l'exécution manuelle depuis l'interface GitHub
  workflow_dispatch:

  # Exécution à chaque push sur main (pour tester)
  push:
    branches:
      - main

jobs:
  generate-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Coupe le job après 15 min pour éviter le timeout de 6h

    steps:
      # 1. Récupérer le code du repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Installer Node.js
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Installer les dépendances
      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      # 4. Exécuter le scraper
      - name: 🤖 Run RSS generator
        run: npm run generate

      # 5. Commit et push des changements
      - name: 💾 Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add feed.xml index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Auto-update RSS feed - $(date +'%Y-%m-%d %H:%M:%S')" && git push)
